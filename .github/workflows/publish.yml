name: CI / Publish

on:
  push:
    branches: [main]
    tags:
      - 'v*.*.*'
  pull_request:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read
  packages: write     # required for maven.pkg.github.com push

jobs:
  ci:
    runs-on: ubuntu-latest
    if: >-
      (github.event_name == 'push' && !startsWith(github.ref, 'refs/tags/')) ||
      github.event_name == 'pull_request'
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '21'
      - uses: gradle/actions/setup-gradle@v4
      - run: chmod +x ./gradlew
      - name: Run detekt
        run: ./gradlew detekt --no-daemon --no-configuration-cache
      - name: Upload detekt report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: detekt-report
          path: '**/build/reports/detekt/'
      - name: Run Semgrep
        uses: semgrep/semgrep-action@v1
        with:
          config: >
            p/kotlin
            p/java
            p/secrets
        continue-on-error: true
      - name: Run Trivy
        uses: aquasecurity/trivy-action@0.28.0
        with:
          scan-type: fs
          scan-ref: .
          format: table
          severity: CRITICAL,HIGH
          ignore-unfixed: true
        # Advisory-only, consistent with Semgrep above: report findings without
        # failing the check. Drop continue-on-error and add exit-code: '1' to gate.
        continue-on-error: true

  publish:
    runs-on: ubuntu-latest
    if: startsWith(github.ref, 'refs/tags/v')
    needs: ci
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up JDK 21
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '21'

      - name: Setup Gradle
        uses: gradle/actions/setup-gradle@v4
        with:
          # Cache by gradle wrapper version + lockfiles
          cache-read-only: ${{ github.ref != 'refs/heads/main' }}

      - name: Make gradlew executable
        run: chmod +x ./gradlew

      - name: Verify tag matches root version
        if: startsWith(github.ref, 'refs/tags/v')
        run: |
          TAG="${GITHUB_REF#refs/tags/v}"
          PROJECT_VERSION=$(grep -E '^version = "[0-9]' build.gradle.kts | sed -E 's/.*"([^"]+)".*/\1/')
          if [ "$TAG" != "$PROJECT_VERSION" ]; then
            echo "::error::Tag '$TAG' does not match project version '$PROJECT_VERSION'."
            echo "Bump build.gradle.kts version or retag."
            exit 1
          fi
          echo "Tag $TAG matches project version. Publishing."

      - name: Run tests (gate)
        # Skip root :test — its compileClasspath depends on the Hytale Server
        # jar from maven.hytale.com which is intermittently unreachable from
        # CI. Sub-modules don't depend on the Hytale jar, so we exercise them
        # directly.
        run: |
          ./gradlew --no-daemon --no-configuration-cache \
            :nexus-resources:test \
            :nexus-i18n:test \
            :nexus-persistence:test \
            :nexus-scheduler:test \
            :nexus-paper-gui:test \
            :nexus-paper-bedrock:test \
            :nexus-paper-loader:build \
            :nexus-paper-listeners:build \
            :nexus-vault:build \
            :nexus-papi:build

      - name: Publish all modules
        env:
          GITHUB_ACTOR: ${{ github.actor }}
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        # Skips the root :publish if it fails to resolve the Hytale API
        # (the hytale Maven repo is sometimes unreachable from CI).
        # Sub-modules still publish — they don't depend on the Hytale jar.
        run: |
          ./gradlew --no-daemon --no-configuration-cache \
            :nexus-core:publish \
            :nexus-paper:publish \
            :nexus-resources:publish \
            :nexus-i18n:publish \
            :nexus-persistence:publish \
            :nexus-scheduler:publish \
            :nexus-paper-loader:publish \
            :nexus-paper-gui:publish \
            :nexus-paper-bedrock:publish \
            :nexus-paper-listeners:publish \
            :nexus-vault:publish \
            :nexus-papi:publish
